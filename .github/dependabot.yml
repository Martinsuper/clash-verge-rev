version: 2
updates:
  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'chore(deps)'

  # npm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'chore(deps)'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  # Cargo dependencies (Rust)
  - package-ecosystem: 'cargo'
    directory: '/src-tauri'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'chore(deps)'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
