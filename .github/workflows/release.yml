name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  HUSKY: 0
  NODE_OPTIONS: '--max_old_space_size=4096'

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: false

jobs:
  check_version:
    name: Check tag matches package.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          TAG_REF="${GITHUB_REF_NAME:-${GITHUB_REF##*/}}"
          PKG_VERSION=$(jq -r .version package.json)
          if [[ "$TAG_REF" != "v$PKG_VERSION" ]]; then
            echo "::error::Tag $TAG_REF does not match package.json v$PKG_VERSION"
            exit 1
          fi

  release:
    name: Release ${{ matrix.target }}
    needs: [check_version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: windows-2022
            target: x86_64-pc-windows-msvc
          - os: windows-2022
            target: aarch64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.91.0'
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          prefix-key: 'v1-rust'
          key: ${{ matrix.target }}
          workspaces: '. -> target'

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxslt1.1 libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install macOS x86_64 OpenSSL
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          arch -x86_64 brew install openssl@3
          {
            echo "OPENSSL_DIR=$(brew --prefix openssl@3)"
            echo "OPENSSL_INCLUDE_DIR=$(brew --prefix openssl@3)/include"
            echo "OPENSSL_LIB_DIR=$(brew --prefix openssl@3)/lib"
            echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig"
          } >> $GITHUB_ENV

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'
          cache: 'pnpm'

      - name: Install JS deps & prebuild
        run: |
          pnpm install --frozen-lockfile
          pnpm run prebuild ${{ matrix.target }}

      - name: Disable updater signing (no TAURI key)
        shell: bash
        run: |
          tmp=$(mktemp)
          jq '.bundle.createUpdaterArtifacts = false' src-tauri/tauri.conf.json > "$tmp"
          mv "$tmp" src-tauri/tauri.conf.json

      - name: Tauri build
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Clash Verge Rev ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG for details.'
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          tauriScript: pnpm
          args: --target ${{ matrix.target }}

      - name: Rename Windows installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Get-ChildItem ".\target\${{ matrix.target }}\release\bundle\nsis\*-setup.exe" |
            ForEach-Object { Rename-Item $_.FullName ($_.Name -replace '-setup\.exe$', '.exe') }

  release-arm-linux:
    name: Release ${{ matrix.target }}
    needs: [check_version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            arch: arm64
          - target: armv7-unknown-linux-gnueabihf
            arch: armhf
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.91.0'
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          prefix-key: 'v1-rust'
          key: ${{ matrix.target }}
          workspaces: '. -> target'

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'
          cache: 'pnpm'

      - name: Install JS deps & prebuild
        run: |
          pnpm install --frozen-lockfile
          pnpm run prebuild ${{ matrix.target }}

      - name: Setup multiarch apt sources
        run: |
          cat | sudo tee /etc/apt/sources.list > /dev/null << 'EOF'
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy main multiverse universe restricted
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy-security main multiverse universe restricted
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy-updates main multiverse universe restricted
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy-backports main multiverse universe restricted
          deb [arch=armhf,arm64] http://ports.ubuntu.com/ubuntu-ports jammy main multiverse universe restricted
          deb [arch=armhf,arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main multiverse universe restricted
          deb [arch=armhf,arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main multiverse universe restricted
          deb [arch=armhf,arm64] http://ports.ubuntu.com/ubuntu-ports jammy-backports main multiverse universe restricted
          EOF
          sudo dpkg --add-architecture ${{ matrix.arch }}
          sudo apt-get update

      - name: Install cross deps
        run: |
          sudo apt-get install -y \
            libxslt1.1:${{ matrix.arch }} \
            libwebkit2gtk-4.1-dev:${{ matrix.arch }} \
            libayatana-appindicator3-dev:${{ matrix.arch }} \
            libssl-dev:${{ matrix.arch }} \
            patchelf:${{ matrix.arch }} \
            librsvg2-dev:${{ matrix.arch }}
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          else
            sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
          fi

      - name: Disable updater signing (no TAURI key)
        run: |
          tmp=$(mktemp)
          jq '.bundle.createUpdaterArtifacts = false' src-tauri/tauri.conf.json > "$tmp"
          mv "$tmp" src-tauri/tauri.conf.json

      - name: Tauri build
        run: |
          export PKG_CONFIG_ALLOW_CROSS=1
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH
            export PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu/
          else
            export PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig:$PKG_CONFIG_PATH
            export PKG_CONFIG_SYSROOT_DIR=/usr/arm-linux-gnueabihf/
          fi
          pnpm build --target ${{ matrix.target }}

      - name: Upload to draft release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Clash Verge Rev ${{ github.ref_name }}'
          draft: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          files: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/rpm/*.rpm

  publish:
    name: Publish release
    needs: [release, release-arm-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          PRERELEASE: ${{ contains(github.ref_name, '-rc') }}
        run: |
          release_id=$(gh api repos/${{ github.repository }}/releases \
            --paginate --jq ".[] | select(.tag_name == \"$TAG_NAME\") | .id" | head -n1)
          if [ -z "$release_id" ]; then
            echo "::error::No release found for $TAG_NAME"
            exit 1
          fi
          gh api --method PATCH repos/${{ github.repository }}/releases/"$release_id" \
            -f name="Clash Verge Rev $TAG_NAME" \
            -F draft=false \
            -F prerelease="$PRERELEASE" \
            --silent
